name: client-build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Upload built assets to the main repository release'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release tag in the main repository'
        required: false
        type: string
      main_repository:
        description: 'Main repository that owns the release'
        required: false
        type: string
      source_repository:
        description: 'Main repository that requested this build'
        required: false
        type: string
      source_sha:
        description: 'Main repository source SHA for traceability'
        required: false
        type: string

permissions:
  contents: read

env:
  HOSTD_REPOSITORY: linshuboy/jarvis-hostd

jobs:
  desktop-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
        shell: bash
    steps:
      - id: settings
        name: Resolve settings
        working-directory: .
        shell: bash
        env:
          MAIN_REPOSITORY: ${{ inputs.main_repository || vars.MAIN_RELEASE_REPOSITORY }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
          REQUESTED_PUBLISH_RELEASE: ${{ inputs.publish_release }}
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="${REQUESTED_RELEASE_TAG:-}"
          if [[ -z "$release_tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          fi
          should_publish=false
          if [[ "${REQUESTED_PUBLISH_RELEASE:-}" == "true" || "${GITHUB_REF_TYPE}" == "tag" ]]; then
            should_publish=true
            if [[ -z "${MAIN_REPOSITORY:-}" ]]; then
              echo "Missing main_repository input or MAIN_RELEASE_REPOSITORY variable for release upload." >&2
              exit 1
            fi
          fi
          if [[ -z "${CROSS_REPO_TOKEN:-}" ]]; then
            echo "Missing CROSS_REPO_TOKEN secret for hostd checkout." >&2
            exit 1
          fi
          echo "main_repository=${MAIN_REPOSITORY:-}" >>"$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >>"$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >>"$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          path: apps/desktop
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.HOSTD_REPOSITORY }}
          path: runtime/hostd
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: runtime/hostd/go.mod
          cache: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            rpm
      - name: Install desktop dependencies
        run: npm ci
      - name: Verify release version
        if: startsWith(steps.settings.outputs.release_tag, 'v')
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "v${version}" != "${{ steps.settings.outputs.release_tag }}" ]]; then
            printf 'release tag %s does not match desktop package version %s\n' "${{ steps.settings.outputs.release_tag }}" "$version" >&2
            exit 1
          fi
      - name: Build Linux desktop bundles
        run: |
          npm run build
          npm run build:icons
          npm run build:hostd
          npx tauri build --bundles deb,rpm
      - name: Stage Linux desktop assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find src-tauri/target/release/bundle/deb -name '*.deb' -exec cp {} release-assets/ \;
          find src-tauri/target/release/bundle/rpm -name '*.rpm' -exec cp {} release-assets/ \;
          test "$(find release-assets -type f | wc -l)" -gt 0
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-bundles
          path: apps/desktop/release-assets/*
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        if: steps.settings.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        with:
          repository: ${{ steps.settings.outputs.main_repository }}
          tag_name: ${{ steps.settings.outputs.release_tag }}
          files: apps/desktop/release-assets/*
          fail_on_unmatched_files: true

  desktop-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
        shell: bash
    steps:
      - id: settings
        name: Resolve settings
        working-directory: .
        shell: bash
        env:
          MAIN_REPOSITORY: ${{ inputs.main_repository || vars.MAIN_RELEASE_REPOSITORY }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
          REQUESTED_PUBLISH_RELEASE: ${{ inputs.publish_release }}
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="${REQUESTED_RELEASE_TAG:-}"
          if [[ -z "$release_tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          fi
          should_publish=false
          if [[ "${REQUESTED_PUBLISH_RELEASE:-}" == "true" || "${GITHUB_REF_TYPE}" == "tag" ]]; then
            should_publish=true
            if [[ -z "${MAIN_REPOSITORY:-}" ]]; then
              echo "Missing main_repository input or MAIN_RELEASE_REPOSITORY variable for release upload." >&2
              exit 1
            fi
          fi
          if [[ -z "${CROSS_REPO_TOKEN:-}" ]]; then
            echo "Missing CROSS_REPO_TOKEN secret for hostd checkout." >&2
            exit 1
          fi
          echo "main_repository=${MAIN_REPOSITORY:-}" >>"$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >>"$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >>"$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          path: apps/desktop
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.HOSTD_REPOSITORY }}
          path: runtime/hostd
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: runtime/hostd/go.mod
          cache: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install desktop dependencies
        run: npm ci
      - name: Verify release version
        if: startsWith(steps.settings.outputs.release_tag, 'v')
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "v${version}" != "${{ steps.settings.outputs.release_tag }}" ]]; then
            printf 'release tag %s does not match desktop package version %s\n' "${{ steps.settings.outputs.release_tag }}" "$version" >&2
            exit 1
          fi
      - name: Build Windows desktop bundles
        run: |
          npm run build
          npm run build:icons
          npm run build:hostd
          npx tauri build --bundles nsis
      - name: Stage Windows desktop assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find src-tauri/target/release/bundle/nsis -name '*.exe' -exec cp {} release-assets/ \;
          test "$(find release-assets -type f | wc -l)" -gt 0
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-bundles
          path: apps/desktop/release-assets/*
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        if: steps.settings.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        with:
          repository: ${{ steps.settings.outputs.main_repository }}
          tag_name: ${{ steps.settings.outputs.release_tag }}
          files: apps/desktop/release-assets/*
          fail_on_unmatched_files: true

  desktop-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_suffix: aarch64
            goarch: arm64
            resource_arch: aarch64
            tauri_target: aarch64-apple-darwin
          - artifact_suffix: x86_64
            goarch: amd64
            resource_arch: x86_64
            tauri_target: x86_64-apple-darwin
    defaults:
      run:
        working-directory: apps/desktop
        shell: bash
    steps:
      - id: settings
        name: Resolve settings
        working-directory: .
        shell: bash
        env:
          MAIN_REPOSITORY: ${{ inputs.main_repository || vars.MAIN_RELEASE_REPOSITORY }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
          REQUESTED_PUBLISH_RELEASE: ${{ inputs.publish_release }}
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="${REQUESTED_RELEASE_TAG:-}"
          if [[ -z "$release_tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          fi
          should_publish=false
          if [[ "${REQUESTED_PUBLISH_RELEASE:-}" == "true" || "${GITHUB_REF_TYPE}" == "tag" ]]; then
            should_publish=true
            if [[ -z "${MAIN_REPOSITORY:-}" ]]; then
              echo "Missing main_repository input or MAIN_RELEASE_REPOSITORY variable for release upload." >&2
              exit 1
            fi
          fi
          if [[ -z "${CROSS_REPO_TOKEN:-}" ]]; then
            echo "Missing CROSS_REPO_TOKEN secret for hostd checkout." >&2
            exit 1
          fi
          echo "main_repository=${MAIN_REPOSITORY:-}" >>"$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >>"$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >>"$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          path: apps/desktop
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.HOSTD_REPOSITORY }}
          path: runtime/hostd
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: runtime/hostd/go.mod
          cache: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust macOS target
        run: rustup target add "${{ matrix.tauri_target }}"
      - name: Install desktop dependencies
        run: npm ci
      - name: Verify release version
        if: startsWith(steps.settings.outputs.release_tag, 'v')
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "v${version}" != "${{ steps.settings.outputs.release_tag }}" ]]; then
            printf 'release tag %s does not match desktop package version %s\n' "${{ steps.settings.outputs.release_tag }}" "$version" >&2
            exit 1
          fi
      - name: Build macOS desktop bundles
        run: |
          npm run build
          npm run build:icons
          GOOS=darwin GOARCH=${{ matrix.goarch }} TARGET_TRIPLE=${{ matrix.tauri_target }} npm run build:hostd
          npx tauri build --target "${{ matrix.tauri_target }}" --bundles app,dmg
      - name: Stage macOS desktop assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find "src-tauri/target/${{ matrix.tauri_target }}/release/bundle/dmg" -name '*.dmg' -exec cp {} release-assets/ \;
          test "$(find release-assets -type f | wc -l)" -gt 0
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.artifact_suffix }}-bundles
          path: apps/desktop/release-assets/*
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        if: steps.settings.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        with:
          repository: ${{ steps.settings.outputs.main_repository }}
          tag_name: ${{ steps.settings.outputs.release_tag }}
          files: apps/desktop/release-assets/*
          fail_on_unmatched_files: true
